# configs/system_params.yaml
# 실제 수집 데이터 shape 기준으로 업데이트:
#   qpos_traj.npy : (N, 38)
#   qvel_traj.npy : (N, 37)
#   input_traj.npy: (N, 31)

system:
  state_dimension: 75          # nq (38) + nv (37) = 75
  input_dimension: 7           # 오른팔 토크 채널 수 (arm_r_joint1~7)
  input_actuator_indices: [16, 17, 18, 19, 20, 21, 22]  # input_traj(31)에서 사용할 actuator 인덱스
  time_step: 0.02              # teleop_ffw_right_arm_ik.py의 CTRL_DT = 0.02s
  nq: 38                       # qpos_traj.npy의 두 번째 차원
  nv: 37                       # qvel_traj.npy의 두 번째 차원
  model_xml_path: ffw2_ioc_mpc/system_models/mujoco_models/scene_ffw_sg2.xml
