processing:
  segment_strategy: fixed_length
  segment_length_seconds: 2.0
  segment_start_seconds: 5.0
  filter_type: savgol
  savgol_window_length: 11
  savgol_polyorder: 3

constraint_builder:
  include_domain_knowledge_constraints: true
  include_convex_hull_constraints: false
  input_torque_limits_u:
    min: -100.0
    max: 100.0

optimizer:
  solver: ipopt
  max_iterations: 150
  num_initial_guesses: 6
  initial_guesses_strategy: random
  random_init_scale: 0.001
  l1_reg_lambda: 1.0e-5
  l1_reg_nu: 0.0
  l2_reg_theta: 1.0e-3
  l2_reg_nu: 1.0e-4
  l2_reg_lambda: 0.0
  r_diag_balance_weight: 5.0e-2
  q_diag_balance_weight: 5.0e-2
  r_trace_target: 1.0
  enable_q_trace_constraint: false
  q_trace_target: 500.0

  # 학습 결과 선택 게이트 (best-effort 수렴 우선)
  # IPOPT가 max_iter 도달로 success=False여도 KKT 품질이 좋은 해를 채택
  require_success_for_selection: false
  max_grad_inf_for_selection: 0.3
  max_csc_inf_for_selection: 1.0e-3
  max_r_norm_abs_for_selection: 5.0e-3
  tol: 1.0e-3

  ipopt_print_level: 0
  print_frequency_iter: 10
  ipopt_hessian_approximation: limited-memory
  ipopt_sb: "yes"

  casadi_print_time: false
  casadi_verbose: false
  casadi_verbose_init: false

  show_solver_progress: true
  suppress_casadi_output: false

constraint_identification:
  threshold_lambda: 1.0e-3
  aggregation: sum_all
  verbose: true
